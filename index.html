<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaziya Banu K — Full Stack Developer & UI/UX Designer</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #cccccc;
            line-height: 1.9;
            font-size: 18px;
            scroll-behavior: smooth;
        }

        /* NAVBAR */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 45, 120, 0.1);
            padding: 20px 0;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
        }

        .nav-links {
            display: flex;
            gap: 40px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: #cccccc;
            font-size: 16px;
            transition: color 0.3s;
            font-weight: 500;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #ff2d78;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background: #ff2d78;
            margin: 5px 0;
            transition: 0.3s;
        }

        /* HERO SECTION */
        .hero {
            margin-top: 80px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 40px;
        }

        .hero-content h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 68px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .hero-content p {
            font-size: 24px;
            color: #ff2d78;
            max-width: 800px;
            margin: 0 auto 40px;
            line-height: 1.6;
        }

        .cta-button {
            display: inline-block;
            background: #ff2d78;
            color: #ffffff;
            padding: 16px 40px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            border: 2px solid #ff2d78;
        }

        .cta-button:hover {
            background: transparent;
            box-shadow: 0 0 24px rgba(255, 45, 120, 0.35);
            transform: translateY(-6px);
        }

        .cta-button.outline {
            background: transparent;
            border: 2px solid #ff2d78;
            color: #ff2d78;
        }

        .cta-button.outline:hover {
            background: #ff2d78;
            color: #ffffff;
        }

        /* SCROLL INDICATOR */
        .scroll-indicator {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            animation: bounce 2s infinite;
        }

        .scroll-indicator span {
            display: block;
            width: 2px;
            height: 20px;
            background: #ff2d78;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(10px); }
        }

        /* SECTIONS */
        section {
            padding: 80px 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        section h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 32px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 60px;
            text-align: center;
        }

        /* FADE-IN ANIMATION */
        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.6s ease-out;
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* FOOTER */
        footer {
            background: #0a0a0a;
            border-top: 1px solid rgba(255, 45, 120, 0.1);
            padding: 40px;
            text-align: center;
            color: #666666;
        }

        /* MOBILE RESPONSIVE */
        @media (max-width: 768px) {
            .hamburger {
                display: flex;
            }

            .nav-links {
                position: absolute;
                top: 70px;
                left: 0;
                flex-direction: column;
                background: rgba(10, 10, 10, 0.98);
                width: 100%;
                text-align: center;
                gap: 0;
                max-height: 0;
                overflow: hidden;
                transition: max-height 0.3s;
            }

            .nav-links.active {
                max-height: 400px;
            }

            .nav-links a {
                padding: 20px;
                border-bottom: 1px solid rgba(255, 45, 120, 0.1);
            }

            .hero-content h1 {
                font-size: 48px;
            }

            .hero-content p {
                font-size: 18px;
            }

            section {
                padding: 60px 20px;
            }

            section h2 {
                font-size: 28px;
            }

            .nav-container {
                padding: 0 20px;
            }
        }
    </style>
</head>
<body>
    <!-- NAVBAR -->
    <nav>
        <div class="nav-container">
            <div class="logo">SK</div>
            <ul class="nav-links">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="skills.html">Skills</a></li>
                <li><a href="education.html">Education</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="achievements.html">Achievements</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- HERO SECTION -->
    <section class="hero">
        <div class="hero-content fade-in">
            <h1>Shaziya Banu K</h1>
            <p>Full Stack Developer • UI/UX Designer • IoT Enthusiast</p>
            <div style="margin-top: 40px;">
                <a href="about.html" class="cta-button">Explore My Work</a>
            </div>
        </div>
        <div class="scroll-indicator">
            <span></span>
        </div>
    </section>

    <!-- FOOTER -->
    <footer>
        <p>&copy; 2026 Shaziya Banu K. All rights reserved.</p>
    </footer>

    <script>
        // Hamburger Menu Toggle
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.querySelector('.nav-links');

        hamburger.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        // Close menu when link clicked
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
            });
        });

        // Intersection Observer for Fade-in Animation
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -100px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.fade-in').forEach(el => {
            observer.observe(el);
        });

        // Set active nav link
        function setActiveNav() {
            const currentPage = window.location.pathname.split('/').pop() || 'index.html';
            document.querySelectorAll('.nav-links a').forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('href') === currentPage) {
                    link.classList.add('active');
                }
            });
        }

        setActiveNav();
    </script>
</body>
</html>
